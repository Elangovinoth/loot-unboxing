workflows:
  android-release:
    name: PriceRadar Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Upgrade Gradle wrapper
        script: |
          cd android
          sed -i '' 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.3-all.zip|' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build Android APK
        script: flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - elangovinoth999@gmail.com        # ← your email here
        notify:
          success: true
          failure: true
